services:
  - type: web
    name: telegram-archive-bot
    env: python
    plan: free
        pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_render.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
