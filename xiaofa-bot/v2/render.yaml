services:
  - type: web
    name: gui-sorter-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_render.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: PORT
        value: 10000
